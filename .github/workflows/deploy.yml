name: Build and test ENT

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm test
      - run: node server.js >/tmp/ent.log 2>&1 &
      - run: sleep 5
      - run: curl -fsS http://127.0.0.1:3000/api/health
